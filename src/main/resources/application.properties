spring.application.name=medium-ai-autonomous-publisher

spring.datasource.url=jdbc:postgresql://localhost:5432/aiblogstudio
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Unified model configuration - change model details here:
model.name=stepfun-ai/step-3.5-flash
model.base-url=https://integrate.api.nvidia.com/v1
model.api-key=${NVIDIA_API_KEY}
model.rpm-limit=50

tavily.api-key=${TAVILY_API_KEY}
devto.api-key=${DEVTO_API_KEY}

auto-publish=true

server.port=${PORT:8080}

logging.level.com.sumit.mediumaipublisher=DEBUG
logging.level.dev.langchain4j=INFO



logging.level.io.github.resilience4j=WARN
logging.level.dev.langchain4j.http=WARN
logging.level.dev.langchain4j.internal.RetryUtils=WARN



# ═══════════════════════════════════════════════════════════
# JWT Configuration
# ═══════════════════════════════════════════════════════════
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}

# ═══════════════════════════════════════════════════════════
# Spring Mail (SMTP)
# ═══════════════════════════════════════════════════════════
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
